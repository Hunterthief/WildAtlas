name: Generate Animals JSON

on:
  push:
    paths:
      - 'generator/**'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force re-fetch all data'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Debug Secrets
        run: |
          echo "🔍 Checking if API_NINJAS_KEY is set..."
          if [ -n "${{ secrets.API_NINJAS_KEY }}" ]; then
            echo "✅ API_NINJAS_KEY is set (length: ${{ secrets.API_NINJAS_KEY }})"
          else
            echo "❌ API_NINJAS_KEY is NOT set"
          fi

      - name: Run generator
        env:
          API_NINJAS_KEY: ${{ secrets.API_NINJAS_KEY }}
        run: |
          cd generator
          echo "🔍 In script - API_NINJAS_KEY length: ${#API_NINJAS_KEY}"
          if [ -n "$API_NINJAS_KEY" ]; then
            echo "✅ API_NINJAS_KEY is available in environment"
          else
            echo "❌ API_NINJAS_KEY is NOT available in environment"
          fi
          if [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            python generate_animals.py --force
          else
            python generate_animals.py
          fi

      - name: Commit and push JSON
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add data/animals.json
          git add data/animal_stats/
          git commit -m "🤖 Auto-update animal data [skip ci]" || echo "No changes to commit"
          git push https://$MY_PAT@github.com/${{ github.repository }} HEAD:main
