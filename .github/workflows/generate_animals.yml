# .github/workflows/generate_animals.yml
name: Generate Animal Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r generator/requirements.txt
    
    - name: Generate animal data
      run: |
        cd generator
        python generate_animals.py --force
      env:
        API_NINJAS_KEY: ${{ secrets.API_NINJAS_KEY }}
    
    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add data/animals.json
        git add data/*.json || true
        git diff --staged --quiet || git commit -m "Auto-update animal data [skip ci]"
        git push
