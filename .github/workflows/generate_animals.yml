name: Generate Animals JSON

on:
  push:
    paths:
      - 'generator/**'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force re-fetch all data'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Clean up old data directory
        run: |
          echo "🧹 Cleaning up old generator/data/ directory..."
          rm -rf generator/data/
          echo "✅ Old directory removed"

      - name: Run generator
        env:
          API_NINJAS_KEY: ${{ secrets.API_NINJAS_KEY }}
        run: |
          cd generator
          if [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            python generate_animals.py --force
          else
            python generate_animals.py
          fi

      - name: Debug - Show what was created
        run: |
          echo "=== Repo Root ==="
          ls -la
          echo "=== data/ directory ==="
          ls -la data/ 2>/dev/null || echo "data/ not found"
          echo "=== data/animal_stats/ (first 10 files) ==="
          ls data/animal_stats/ 2>/dev/null | head -10 || echo "data/animal_stats/ not found"
          echo "=== generator/data/ (should not exist) ==="
          ls generator/data/ 2>/dev/null || echo "generator/data/ does not exist (good!)"

      - name: Commit and push JSON
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          
          echo "📊 Git status:"
          git status
          
          echo "📁 Adding files..."
          git add data/animals.json
          git add data/animal_stats/
          
          echo "💬 Committing..."
          git commit -m "🤖 Auto-update animal data [skip ci]" || echo "No changes to commit"
          
          echo "🚀 Pushing..."
          git push https://$MY_PAT@github.com/${{ github.repository }} HEAD:main
