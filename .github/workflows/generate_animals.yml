name: Generate Animals JSON

on:
  push:
    paths:
      - 'generator/**'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force re-fetch all data'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          pip install requests
          pip install beautifulsoup4

      # 4️⃣ Run the Python generator (PASS IUCN_API_KEY HERE!)
      - name: Run generator
        env:
          IUCN_API_KEY: ${{ secrets.IUCN_API_KEY }}  # ← This was missing!
        run: |
          if [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            python generator/generate_animals.py --force
          else
            python generator/generate_animals.py
          fi

      # 5️⃣ Commit and push JSON using PAT
      - name: Commit and push JSON
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add data/animals.json
          git commit -m "Auto-generate animals.json via Action" || echo "No changes to commit"
          git push https://$MY_PAT@github.com/${{ github.repository }} HEAD:main
