name: Generate Animals JSON

on:
  push:
    paths:
      - 'generator/**'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force re-fetch all data'
        required: false
        default: 'true'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Clean up ALL old data directories
        run: |
          echo "🧹 Cleaning up old data directories..."
          rm -rf generator/data/
          rm -rf data/
          echo "✅ Old directories removed"

      - name: Run generator (ALWAYS FORCE)
        env:
          API_NINJAS_KEY: ${{ secrets.API_NINJAS_KEY }}
        run: |
          cd generator
          python generate_animals.py --force

      - name: Debug - Show what was created
        run: |
          echo "=== data/ directory ==="
          ls -la data/ 2>/dev/null || echo "data/ not found"
          echo "=== data/animal_stats/ file count ==="
          ls data/animal_stats/ 2>/dev/null | wc -l || echo "0"

      - name: Commit and push JSON
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          
          git pull --rebase https://$MY_PAT@github.com/${{ github.repository }} main || echo "No remote changes"
          
          git add data/animals.json
          git add data/animal_stats/
          
          git commit -m "🤖 Auto-update animal data [skip ci]" || echo "No changes to commit"
          
          git push https://$MY_PAT@github.com/${{ github.repository }} HEAD:main
