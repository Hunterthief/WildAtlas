<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Animal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a class="back" href="index.html">← Back</a>

<div id="animal"></div>

<script>

const params = new URLSearchParams(location.search)
const name = params.get("name")

fetch("data/animals.json")
.then(r=>r.json())
.then(data=>{

const a=data.find(x=>x.name===name)

document.getElementById("animal").innerHTML=`

<h1>${a.name}</h1>

<img class="hero" src="${a.image}">

<p class="desc">${a.summary}</p>

`

})

</script>

</body>
</html>
