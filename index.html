<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildAtlas | Discover the Animal Kingdom</title>
    <meta name="description" content="Explore beautiful facts about animals from around the world. Inspired by Facts.app.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header / Search Bar -->
    <header class="topbar">
        <div class="topbar-content">
            <div class="logo-section">
                <h1>WildAtlas</h1>
                <p class="tagline">Discover the living world, one fact at a time.</p>
            </div>
            <div class="search-section">
                <input type="text" id="search-input" placeholder="Search animals (e.g., Tiger, Ocean, Mammal)...">
            </div>
        </div>
    </header>

    <!-- Animal Type Tabs -->
    <section class="type-tabs">
        <div class="tabs-container">
            <button class="tab-btn active" data-type="all">
                <span class="tab-icon">🌍</span>
                <span class="tab-label">All Animals</span>
                <span class="tab-count" id="count-all">0</span>
            </button>
            <button class="tab-btn" data-type="mammal">
                <span class="tab-icon">🦁</span>
                <span class="tab-label">Mammals</span>
                <span class="tab-count" id="count-mammal">0</span>
            </button>
            <button class="tab-btn" data-type="bird">
                <span class="tab-icon">🦅</span>
                <span class="tab-label">Birds</span>
                <span class="tab-count" id="count-bird">0</span>
            </button>
            <button class="tab-btn" data-type="reptile">
                <span class="tab-icon">🐍</span>
                <span class="tab-label">Reptiles</span>
                <span class="tab-count" id="count-reptile">0</span>
            </button>
            <button class="tab-btn" data-type="fish">
                <span class="tab-icon">🦈</span>
                <span class="tab-label">Fish</span>
                <span class="tab-count" id="count-fish">0</span>
            </button>
            <button class="tab-btn" data-type="amphibian">
                <span class="tab-icon">🐸</span>
                <span class="tab-label">Amphibians</span>
                <span class="tab-count" id="count-amphibian">0</span>
            </button>
            <button class="tab-btn" data-type="insect">
                <span class="tab-icon">🦋</span>
                <span class="tab-label">Insects</span>
                <span class="tab-count" id="count-insect">0</span>
            </button>
        </div>
    </section>

    <!-- Main Animal Grid -->
    <main id="grid">
        <!-- Loading State -->
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Exploring the wild...</p>
        </div>
        <!-- Cards will be injected here by script.js -->
    </main>

    <!-- Inspiration Section -->
    <section class="inspiration">
        <h2>Inspired by Facts.app</h2>
        <p>Just like <a href="https://www.facts.app/" target="_blank" rel="noopener noreferrer">Facts.app</a> makes prehistoric creatures accessible, WildAtlas celebrates the amazing animals living on Earth today.</p>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <p>&copy; 2026 WildAtlas Project. Data sourced from Wikipedia & iNaturalist.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
